<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UploadRanger 测试靶场{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eaeaea;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }
        
        header h1 {
            color: #e94560;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        .card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #2d3748;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .level-card {
            background: rgba(15, 52, 96, 0.6);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #2d3748;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .level-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(233, 69, 96, 0.2);
        }
        
        .level-card h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .difficulty {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
        
        .difficulty.easy {
            background: #4ecca3;
            color: #1a1a2e;
        }
        
        .difficulty.medium {
            background: #f9a825;
            color: #1a1a2e;
        }
        
        .difficulty.hard {
            background: #e94560;
            color: white;
        }
        
        .level-card p {
            color: #a0a0a0;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #e94560;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .btn:hover {
            background: #ff6b6b;
        }
        
        .btn-secondary {
            background: #0f3460;
        }
        
        .btn-secondary:hover {
            background: #1a4a7a;
        }
        
        .upload-form {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #eaeaea;
        }
        
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid #2d3748;
            border-radius: 5px;
            color: #eaeaea;
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .alert.success {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            color: #4ecca3;
        }
        
        .alert.error {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #e94560;
        }
        
        .nav {
            margin-bottom: 20px;
        }
        
        .nav a {
            color: #e94560;
            text-decoration: none;
            margin-right: 15px;
        }
        
        .nav a:hover {
            text-decoration: underline;
        }
        
        .info-box {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid #3498db;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .info-box h4 {
            color: #3498db;
            margin-bottom: 10px;
        }
        
        .info-box ul {
            margin-left: 20px;
            color: #a0a0a0;
        }
        
        .info-box li {
            margin-bottom: 5px;
        }
        
        code {
            background: rgba(22, 33, 62, 0.8);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Consolas', monospace;
            color: #e94560;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #a0a0a0;
            border-top: 1px solid #2d3748;
            margin-top: 50px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ UploadRanger 测试靶场</h1>
            <p>文件上传漏洞测试与练习平台</p>
        </header>
        
        {% block content %}{% endblock %}
        
        <footer>
            <p>UploadRanger Test Range | 仅供安全测试使用</p>
        </footer>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
